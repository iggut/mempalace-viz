<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏰 MemPalace 3D Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; background: #0a0a0f; }
    #canvas { width: 100vw; height: 100vh; display: block; }
    .overlay { position: absolute; pointer-events: none; padding: 20px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .title { top: 0; left: 0; font-size: 28px; font-weight: 300; letter-spacing: 1px; z-index: 10; }
    .title span { font-weight: 600; }
    .stats { bottom: 0; left: 0; font-size: 14px; opacity: 0.8; line-height: 1.6; z-index: 10; }
    .controls { top: 0; right: 0; pointer-events: auto; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; backdrop-filter: blur(10px); z-index: 10; }
    .controls button { display: block; width: 100%; padding: 10px 15px; margin-bottom: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; text-align: left; }
    .controls button:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); }
    .controls button.active { background: rgba(100,150,255,0.3); border-color: rgba(100,150,255,0.6); }
    .legend { position: absolute; bottom: 0; right: 0; pointer-events: auto; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; backdrop-filter: blur(10px); z-index: 10; max-height: 50vh; overflow-y: auto; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 6px; color: white; }
    .legend-color { width: 16px; height: 16px; border-radius: 50%; }
    .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; color: white; text-align: center; z-index: 100; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #a5b4fc; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f87171; }
    .tooltip { position: absolute; background: rgba(0,0,0,0.9); padding: 12px 16px; border-radius: 8px; color: white; font-size: 13px; pointer-events: none; z-index: 100; min-width: 150px; }
    .tooltip-title { font-weight: 600; margin-bottom: 4px; }
    .tooltip-subtitle { opacity: 0.7; font-size: 11px; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="overlay title">🏰 <span>MemPalace</span></div>
  <div class="overlay stats" id="stats">Loading...</div>
  <div class="overlay controls">
    <button onclick="setView('wings')" class="active">📚 Wings View</button>
    <button onclick="setView('rooms')">🚪 Rooms View</button>
    <button onclick="toggleAutoRotate()">🔄 Auto Rotate</button>
    <button onclick="resetView()">🎯 Reset View</button>
  </div>
  <div class="overlay legend" id="legend"></div>
  <div class="loading" id="loading"><div class="loading-spinner"></div>Loading MemPalace data...</div>
  <div class="tooltip" id="tooltip" style="display:none;"></div>

  <script>
    var canvas = document.getElementById('canvas');
    var ctx = canvas.getContext('2d');
    if (!ctx) {
      console.error('Failed to get 2D context');
      document.getElementById('loading').innerHTML = '❌ Failed to initialize canvas';
    }
    
    var width, height;
    var camera = { angle: 0, tilt: 0, dist: 100 };
    var wingsData = {}, roomsData = {}, currentView = 'wings';
    var nodes = [], hoveredNode = null;
    var mousePos = { x: 0, y: 0 }, prevMouse = { x: 0, y: 0 };
    var isDragging = false, autoRotate = true;
    
    var COLORS = {};
    var colorPalette = ['#a5b4fc', '#86efac', '#fbbf24', '#f87171', '#60a5fa', '#f472b6', '#34d399', '#a78bfa'];
    var colorIndex = 0;
    
    function getColor(name) {
      if (!COLORS[name]) {
        COLORS[name] = colorPalette[colorIndex % colorPalette.length] || '#a5b4fc';
        colorIndex++;
      }
      return COLORS[name] || '#a5b4fc';
    }
    
    function resize() {
      width = canvas.width = window.innerWidth || 800;
      height = canvas.height = window.innerHeight || 600;
      console.log('Resized to:', width, 'x', height);
    }
    
    // 3D projection with proper perspective
    function project(x, y, z) {
      // Rotate around Y axis (horizontal rotation)
      var x1 = x * Math.cos(camera.angle) - z * Math.sin(camera.angle);
      var z1 = x * Math.sin(camera.angle) + z * Math.cos(camera.angle);
      
      // Rotate around X axis (vertical tilt)
      var y2 = y * Math.cos(camera.tilt) - z1 * Math.sin(camera.tilt);
      var z2 = y * Math.sin(camera.tilt) + z1 * Math.cos(camera.tilt);
      
      // Perspective projection
      var dist = camera.dist - z2;
      var scale = 300 / Math.max(dist, 10);
      
      // Ensure width and height are valid
      if (!isFinite(width) || !isFinite(height)) {
        return { x: 0, y: 0, depth: z2, scale: 1 };
      }
      
      return {
        x: width/2 + x1 * scale,
        y: height/2 + y2 * scale,
        depth: z2,
        scale: scale
      };
    }
    
    function hexToRgba(hex, alpha) {
      if (!hex || typeof hex !== 'string' || hex.length < 7) return 'rgba(255,255,255,' + alpha + ')';
      var r = parseInt(hex.slice(1,3), 16);
      var g = parseInt(hex.slice(3,5), 16);
      var b = parseInt(hex.slice(5,7), 16);
      if (!isFinite(r) || !isFinite(g) || !isFinite(b)) return 'rgba(255,255,255,' + alpha + ')';
      return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }
    
    function lighten(hex, pct) {
      var num = parseInt(hex.slice(1), 16), amt = Math.round(2.55*pct);
      return '#' + (0x1000000 + Math.min(255, ((num >> 16) + amt))*0x10000 + Math.min(255, (((num >> 8) & 0xFF) + amt))*0x100 + Math.min(255, ((num & 0xFF) + amt))).toString(16).slice(1);
    }
    
    function darken(hex, pct) {
      var num = parseInt(hex.slice(1), 16), amt = Math.round(2.55*pct);
      return '#' + (0x1000000 + Math.max(0, ((num >> 16) - amt))*0x10000 + Math.max(0, (((num >> 8) & 0xFF) - amt))*0x100 + Math.max(0, ((num & 0xFF) - amt))).toString(16).slice(1);
    }
    
    function drawSphere(x, y, radius, color, scale) {
      if (!isFinite(x) || !isFinite(y) || !isFinite(radius) || radius <= 0 || !isFinite(scale)) return;
      
      var actualRadius = radius * (scale || 1);
      var innerOffset = actualRadius * 0.3;
      
      var grad = ctx.createRadialGradient(
        x - innerOffset, y - innerOffset, 0,
        x, y, actualRadius
      );
      grad.addColorStop(0, lighten(color, 50));
      grad.addColorStop(0.4, color);
      grad.addColorStop(1, darken(color, 40));
      
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, actualRadius, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function drawGlow(x, y, radius, color) {
      if (!isFinite(x) || !isFinite(y) || !isFinite(radius) || radius <= 0) return;
      var glowSize = Math.max(0, radius * 2.5);
      var grad = ctx.createRadialGradient(x, y, 0, x, y, glowSize);
      var rgba = hexToRgba(color, 0.3);
      if (!rgba.includes('NaN')) {
        grad.addColorStop(0, rgba);
        grad.addColorStop(1, hexToRgba(color, 0));
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, glowSize, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    function drawLine3D(x1, y1, z1, x2, y2, z2, color) {
      var p1 = project(x1, y1, z1);
      var p2 = project(x2, y2, z2);
      ctx.strokeStyle = hexToRgba(color, 0.2);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
    }
    
    function renderWings() {
      var wingNames = Object.keys(wingsData);
      if (wingNames.length === 0) return;
      
      nodes = [];
      var time = Date.now() * 0.001;
      
      // Debug: Check canvas size
      if (!isFinite(width) || !isFinite(height)) {
        console.error('Invalid canvas size:', width, 'x', height);
        return;
      }
      
      // Draw central hub with pulsing effect
      var pulse = 1 + Math.sin(time * 2) * 0.1;
      var center = project(0, 0, 0);
      if (!isFinite(center.x) || !isFinite(center.y)) {
        console.error('Invalid center projection:', center);
        return;
      }
      drawGlow(center.x, center.y, 30 * pulse, '#fff');
      drawSphere(center.x, center.y, 12 * pulse, '#888', 1);
      
      // Arrange wings in a spiral/organic pattern
      var maxRadius = 60;
      for (var i = 0; i < wingNames.length; i++) {
        var wing = wingNames[i];
        var progress = i / Math.max(wingNames.length - 1, 1);
        
        // Organic spiral arrangement
        var angle = progress * Math.PI * 4 + time;
        var radius = 20 + progress * (maxRadius - 20);
        var x = Math.cos(angle) * radius;
        var z = Math.sin(angle) * radius;
        
        // Gentle floating animation
        var floatY = Math.sin(time * 1.5 + i * 0.7) * 8;
        
        var proj = project(x, floatY, z);
        
        // Size based on drawer count
        var drawers = wingsData[wing] || 1;
        var baseSize = Math.max(6, Math.min(25, 4 + Math.log(drawers + 1) * 5));
        
        // Debug: Check values
        if (!isFinite(proj.x) || !isFinite(proj.y) || !isFinite(baseSize) || !isFinite(proj.scale)) {
          console.warn('Invalid values for wing', wing, ':', { proj, baseSize, drawers });
          continue;
        }
        
        var color = getColor(wing);
        if (!color || color.includes('NaN')) {
          console.warn('Invalid color for wing', wing, ':', color);
          color = '#a5b4fc';
        }
        
        drawGlow(proj.x, proj.y, baseSize * proj.scale, color);
        drawSphere(proj.x, proj.y, baseSize, color, proj.scale);
        
        // Connection line to center
        drawLine3D(0, 0, 0, x, floatY * 0.5, z, '#444');
        
        nodes.push({
          x: proj.x, y: proj.y, r: baseSize * proj.scale,
          data: { name: wing, type: 'wing', drawers: drawers, color: color }
        });
      }
    }
    
    function renderRooms() {
      var wingNames = Object.keys(roomsData);
      if (wingNames.length === 0) return;
      
      nodes = [];
      var time = Date.now() * 0.001;
      
      // Central hub
      var center = project(0, 0, 0);
      drawSphere(center.x, center.y, 10, '#666', 1);
      
      var wingRadius = 40;
      for (var wi = 0; wi < wingNames.length; wi++) {
        var wing = wingNames[wi];
        var wingAngle = (wi / wingNames.length) * Math.PI * 2 + time * 0.5;
        var wx = Math.cos(wingAngle) * wingRadius;
        var wz = Math.sin(wingAngle) * wingRadius;
        
        var wingProj = project(wx, 0, wz);
        drawSphere(wingProj.x, wingProj.y, 8, getColor(wing), wingProj.scale);
        drawLine3D(0, 0, 0, wx, 0, wz, '#444');
        
        var rooms = roomsData[wing] || [];
        if (rooms.length === 0) continue;
        
        // Arrange rooms around wing in a circle
        var roomRadius = 15;
        for (var ri = 0; ri < rooms.length; ri++) {
          var room = rooms[ri];
          var roomAngle = wingAngle + (ri / rooms.length) * Math.PI * 2;
          var rx = wx + Math.cos(roomAngle) * roomRadius;
          var rz = wz + Math.sin(roomAngle) * roomRadius;
          
          // Floating animation
          var floatY = Math.sin(time * 2 + ri * 0.5) * 5;
          
          var proj = project(rx, floatY, rz);
          var size = Math.max(3, Math.min(10, 2 + (room.drawers || 1) / 5));
          
          drawSphere(proj.x, proj.y, size, getColor(wing), proj.scale);
          drawLine3D(wx, 0, wz, rx, floatY * 0.5, rz, '#333');
          
          nodes.push({
            x: proj.x, y: proj.y, r: size * proj.scale,
            data: { name: room.name, type: 'room', wing: wing, color: getColor(wing) }
          });
        }
      }
    }
    
    function renderStars() {
      ctx.fillStyle = '#fff';
      var time = Date.now() * 0.0005;
      for (var i = 0; i < 300; i++) {
        var angle = i * 0.5 + time * 0.1;
        var dist = 50 + (i % 50) * 2;
        var sx = Math.cos(angle) * dist + width/2;
        var sy = Math.sin(i * 0.3) * 30 + height/2 + Math.sin(time + i) * 10;
        var twinkle = 0.3 + Math.sin(time * 3 + i * 0.7) * 0.4;
        ctx.globalAlpha = Math.max(0.1, twinkle);
        ctx.beginPath();
        ctx.arc(sx, sy, 0.5 + (i % 3) * 0.5, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    
    function render() {
      // Safety check
      if (!ctx || !isFinite(width) || !isFinite(height)) {
        console.warn('Render aborted: invalid context or dimensions');
        requestAnimationFrame(render);
        return;
      }
      
      // Clear with gradient background
      var grad = ctx.createLinearGradient(0, 0, 0, height);
      grad.addColorStop(0, '#0a0a0f');
      grad.addColorStop(1, '#1a1a2e');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);
      
      // Animated stars
      renderStars();
      
      // Auto rotation
      if (autoRotate && !isDragging) {
        camera.angle += 0.003;
        camera.tilt = Math.sin(Date.now() * 0.001) * 0.2;
      }
      
      // Render current view
      if (Object.keys(wingsData).length > 0) {
        if (currentView === 'wings') {
          renderWings();
        } else {
          renderRooms();
        }
      } else {
        // Show loading animation while data loads
        var time = Date.now() * 0.001;
        var centerX = width / 2;
        var centerY = height / 2;
        var pulse = 1 + Math.sin(time * 3) * 0.2;
        drawSphere(centerX, centerY, 20 * pulse, '#a5b4fc', 1);
        drawGlow(centerX, centerY, 30 * pulse, '#a5b4fc');
      }
      
      // Hover detection
      var foundHover = false;
      for (var i = nodes.length - 1; i >= 0; i--) {
        var node = nodes[i];
        var dx = mousePos.x - node.x;
        var dy = mousePos.y - node.y;
        if (dx*dx + dy*dy < node.r * node.r) {
          hoveredNode = node;
          foundHover = true;
          break;
        }
      }
      
      if (!foundHover && hoveredNode) {
        hoveredNode = null;
      }
      
      // Update cursor and tooltip
      canvas.style.cursor = hoveredNode ? 'pointer' : 'default';
      updateTooltip();
      
      requestAnimationFrame(render);
    }
    
    function updateTooltip() {
      var tooltip = document.getElementById('tooltip');
      if (hoveredNode) {
        var data = hoveredNode.data;
        var title = data.type === 'wing' ? '📚 Wing' : '🚪 Room';
        var extra = data.type === 'wing' 
          ? '📦 ' + data.drawers + ' drawers'
          : '📚 Wing: ' + data.wing;
        
        tooltip.innerHTML = '<div class="tooltip-title" style="color:' + (data.color||'#fff') + '">' + data.name + '</div>' +
                           '<div class="tooltip-subtitle">' + title + '</div>' +
                           '<div class="tooltip-subtitle">' + extra + '</div>';
        tooltip.style.display = 'block';
        tooltip.style.left = (hoveredNode.x + 20) + 'px';
        tooltip.style.top = hoveredNode.y + 'px';
      } else {
        tooltip.style.display = 'none';
      }
    }
    
    var statsText = '';
    
    window.setView = function(view) {
      currentView = view;
      var buttons = document.querySelectorAll('.controls button');
      for (var i = 0; i < buttons.length; i++) {
        if (buttons[i].textContent.includes(view === 'wings' ? 'Wings' : 'Rooms')) {
          buttons[i].classList.add('active');
        } else {
          buttons[i].classList.remove('active');
        }
      }
    };
    
    window.toggleAutoRotate = function() {
      autoRotate = !autoRotate;
    };
    
    window.resetView = function() {
      camera.angle = 0;
      camera.tilt = 0;
      camera.dist = 100;
    };
    
    // Mouse controls
    canvas.addEventListener('mousedown', function(e) {
      isDragging = true;
      prevMouse.x = e.clientX;
      prevMouse.y = e.clientY;
    });
    
    canvas.addEventListener('mousemove', function(e) {
      var rect = canvas.getBoundingClientRect();
      mousePos.x = e.clientX - rect.left;
      mousePos.y = e.clientY - rect.top;
      
      if (isDragging) {
        var dx = e.clientX - prevMouse.x;
        var dy = e.clientY - prevMouse.y;
        camera.angle += dx * 0.01;
        camera.tilt = Math.max(-Math.PI/3, Math.min(Math.PI/3, camera.tilt + dy * 0.01));
        prevMouse.x = e.clientX;
        prevMouse.y = e.clientY;
      }
    });
    
    canvas.addEventListener('mouseup', function() { isDragging = false; });
    canvas.addEventListener('mouseleave', function() { isDragging = false; });
    
    // Wheel zoom
    canvas.addEventListener('wheel', function(e) {
      e.preventDefault();
      camera.dist = Math.max(50, Math.min(200, camera.dist + e.deltaY * 0.1));
    });
    
    // Load data
    async function loadData() {
      try {
        console.log('Loading data...');
        
        var responses = await Promise.all([
          fetch('/api/status'),
          fetch('/api/wings'),
          fetch('/api/taxonomy')
        ]);
        
        if (!responses[0].ok) throw new Error('API error: ' + responses[0].status);
        
        var status = await responses[0].json();
        var wingsResponse = await responses[1].json();
        // Extract wings object from response (API returns {wings: {...}})
        console.log('Wings response:', wingsResponse);
        wingsData = wingsResponse.wings || wingsResponse;
        console.log('Wings data (processed):', wingsData);
        console.log('Wing names:', Object.keys(wingsData));
        var taxonomy = await responses[2].json();
        console.log('Taxonomy:', taxonomy);
        
        // Build rooms data
        for (var wing in taxonomy) {
          var rooms = taxonomy[wing];
          if (!roomsData[wing]) roomsData[wing] = [];
          if (typeof rooms === 'object') {
            for (var room in rooms) {
              var count = rooms[room];
              roomsData[wing].push({ name: room, drawers: typeof count === 'number' ? count : 1 });
            }
          }
        }
        console.log('Rooms data built:', roomsData);
        
        // Update UI
        statsText = '<div>📦 ' + (status.total_drawers || 0) + ' drawers</div>' +
                   '<div>📚 ' + Object.keys(wingsData).length + ' wings • 🚪 ' + Object.keys(status.rooms||{}).length + ' rooms</div>';
        document.getElementById('stats').innerHTML = statsText;
        
        // Legend
        var legendHtml = '';
        var wingNames = Object.keys(wingsData);
        console.log('Building legend for wings:', wingNames);
        for (var i = 0; i < wingNames.length; i++) {
          var wing = wingNames[i];
          var color = getColor(wing);
          console.log('Wing:', wing, 'Color:', color, 'Drawers:', wingsData[wing]);
          legendHtml += '<div class="legend-item">' +
                       '<div class="legend-color" style="background:' + color + '"></div>' +
                       '<span>' + wing + ': ' + wingsData[wing] + ' drawers</span></div>';
        }
        document.getElementById('legend').innerHTML = legendHtml;
        
        document.getElementById('loading').style.display = 'none';
        
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading').innerHTML = 
          '<div class="error">❌ Error: ' + error.message + 
          '<br><small>Make sure <code>node server.js</code> is running</small></div>';
      }
    }
    
    // Initialize
    resize();
    console.log('Canvas initialized:', width, 'x', height);
    window.addEventListener('resize', resize);
    loadData();
    render();
  </script>
</body>
</html>
