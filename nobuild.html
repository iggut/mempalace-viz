<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏰 MemPalace 3D Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; background: #0a0a0f; }
    #canvas { width: 100vw; height: 100vh; display: block; }
    .overlay { position: absolute; pointer-events: none; padding: 20px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .title { top: 0; left: 0; font-size: 28px; font-weight: 300; letter-spacing: 1px; z-index: 10; }
    .title span { font-weight: 600; }
    .stats { bottom: 0; left: 0; font-size: 14px; opacity: 0.8; line-height: 1.6; z-index: 10; }
    .controls { top: 0; right: 0; pointer-events: auto; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; backdrop-filter: blur(10px); z-index: 10; }
    .controls button { display: block; width: 100%; padding: 10px 15px; margin-bottom: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; text-align: left; }
    .controls button:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); }
    .controls button.active { background: rgba(100,150,255,0.3); border-color: rgba(100,150,255,0.6); }
    .legend { position: absolute; bottom: 0; right: 0; pointer-events: auto; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; backdrop-filter: blur(10px); z-index: 10; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 6px; color: white; }
    .legend-color { width: 16px; height: 16px; border-radius: 50%; }
    .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; color: white; text-align: center; z-index: 100; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #a5b4fc; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="overlay title">🏰 <span>MemPalace</span> Visualization</div>
  <div class="overlay stats" id="stats">Loading...</div>
  <div class="overlay controls">
    <button onclick="setView('wings')" class="active">📚 Wings View</button>
    <button onclick="setView('rooms')">🚪 Rooms View</button>
    <button onclick="resetView()">🔄 Reset View</button>
  </div>
  <div class="overlay legend" id="legend"></div>
  <div class="loading" id="loading"><div class="loading-spinner"></div>Loading MemPalace data...</div>

  <script>
    // Simple 3D engine - no dependencies!
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let cameraAngle = 0, cameraDist = 100, cameraHeight = 30;
    let targetAngle = 0, dragging = false, lastX = 0;
    let wingsData = {}, roomsData = {}, currentView = 'wings';
    let nodes = [], hoveredNode = null;
    
    const COLORS = { projects: '#a5b4fc', shared_grocery_list: '#86efac', default: '#fbbf24' };
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    
    // 3D projection
    function project(x, y, z) {
      const rotX = cameraAngle;
      const rx = x;
      const ry = y * Math.cos(rotX) - z * Math.sin(rotX);
      const rz = y * Math.sin(rotX) + z * Math.cos(rotX);
      const dist = cameraDist - rz;
      const scale = 200 / Math.max(dist, 1);
      return {
        x: width/2 + rx * scale,
        y: height/2 - (ry - cameraHeight) * scale,
        scale: scale,
        depth: rz
      };
    }
    
    // Draw a sphere with gradient
    function drawSphere(x, y, radius, color, glow = false) {
      const grad = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, 0, x, y, radius);
      grad.addColorStop(0, lighten(color, 40));
      grad.addColorStop(0.5, color);
      grad.addColorStop(1, darken(color, 30));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
      if (glow) {
        ctx.fillStyle = hexToRgba(color, 0.1);
        ctx.beginPath();
        ctx.arc(x, y, radius * 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }
    
    function lighten(hex, pct) {
      const num = parseInt(hex.slice(1), 16), amt = Math.round(2.55*pct);
      const r = Math.min(255, (num >> 16) + amt);
      const g = Math.min(255, ((num >> 8) & 0x00FF) + amt);
      const b = Math.min(255, (num & 0x0000FF) + amt);
      return '#' + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
    }
    
    function darken(hex, pct) {
      const num = parseInt(hex.slice(1), 16), amt = Math.round(2.55*pct);
      const r = Math.max(0, (num >> 16) - amt);
      const g = Math.max(0, ((num >> 8) & 0x00FF) - amt);
      const b = Math.max(0, (num & 0x0000FF) - amt);
      return '#' + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
    }
    
    // Draw line in 3D
    function drawLine(x1, y1, z1, x2, y2, z2, color, width = 1) {
      const p1 = project(x1, y1, z1);
      const p2 = project(x2, y2, z2);
      ctx.strokeStyle = hexToRgba(color, 0.3);
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
    }
    
    // Render wings view
    function renderWings() {
      const wingNames = Object.keys(wingsData);
      const angleStep = (Math.PI * 2) / wingNames.length;
      const radius = 30;
      
      nodes = [];
      
      // Draw center
      const centerProj = project(0, 0, 0);
      drawSphere(centerProj.x, centerProj.y, 8, '#666');
      
      wingNames.forEach((wing, i) => {
        const angle = i * angleStep;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const proj = project(x, Math.sin(Date.now()*0.001 + i)*0.5, z);
        const size = Math.max(10, Math.min(30, (wingsData[wing] || 1) / 3));
        
        drawSphere(proj.x, proj.y, size, COLORS[wing] || COLORS.default, true);
        
        // Draw line to center
        drawLine(0, 0, 0, x, 0, z, '#444');
        
        nodes.push({ x: proj.x, y: proj.y, r: size, data: { name: wing, type: 'wing', drawers: wingsData[wing] } });
      });
    }
    
    // Render rooms view
    function renderRooms() {
      const wingNames = Object.keys(roomsData);
      const wingAngleStep = (Math.PI * 2) / wingNames.length;
      const wingRadius = 30;
      
      nodes = [];
      
      // Draw center
      const centerProj = project(0, 0, 0);
      drawSphere(centerProj.x, centerProj.y, 8, '#666');
      
      wingNames.forEach((wing, wi) => {
        const wingAngle = wi * wingAngleStep;
        const wx = Math.cos(wingAngle) * wingRadius;
        const wz = Math.sin(wingAngle) * wingRadius;
        const wingProj = project(wx, 0, wz);
        
        drawSphere(wingProj.x, wingProj.y, 8, COLORS[wing] || COLORS.default);
        drawLine(0, 0, 0, wx, 0, wz, '#444');
        
        const rooms = roomsData[wing] || [];
        const roomAngleStep = (Math.PI * 2) / Math.max(rooms.length, 1);
        const roomRadius = 12;
        
        rooms.forEach((room, ri) => {
          const ra = wingAngle + ri * roomAngleStep;
          const rx = wx + Math.cos(ra) * roomRadius;
          const rz = wz + Math.sin(ra) * roomRadius;
          const proj = project(rx, 0, rz);
          const size = Math.max(4, Math.min(12, (room.drawers || 1) / 4));
          
          drawSphere(proj.x, proj.y, size, COLORS[wing] || COLORS.default);
          drawLine(wx, 0, wz, rx, 0, rz, '#333');
          
          nodes.push({ x: proj.x, y: proj.y, r: size, data: { name: room.name, type: 'room', wing } });
        });
      });
    }
    
    // Main render loop
    function render() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, width, height);
      
      // Draw stars
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 200; i++) {
        const sx = ((i * 137.5) % 360 * Math.PI / 180).cos() * 100 + width/2;
        const sy = ((i * 97.3) % 360 * Math.PI / 180).sin() * 50 + height/2;
        ctx.globalAlpha = 0.5 + Math.sin(Date.now()*0.002 + i)*0.3;
        ctx.beginPath();
        ctx.arc(sx, sy, 1, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      
      if (currentView === 'wings') renderWings();
      else if (currentView === 'rooms') renderRooms();
      
      // Auto-rotate
      cameraAngle += 0.002;
      
      // Hover detection and tooltip
      checkHover();
      
      requestAnimationFrame(render);
    }
    
    function checkHover() {
      let found = null;
      for (const node of nodes) {
        const dx = mousePos.x - node.x;
        const dy = mousePos.y - node.y;
        if (dx*dx + dy*dy < node.r * node.r) {
          found = node;
          break;
        }
      }
      
      if (found && found !== hoveredNode) {
        hoveredNode = found;
        canvas.style.cursor = 'pointer';
        showTooltip(found.data);
      } else if (!found && hoveredNode) {
        hoveredNode = null;
        canvas.style.cursor = 'default';
        hideTooltip();
      }
    }
    
    let mousePos = { x: 0, y: 0 };
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mousePos.x = e.clientX - rect.left;
      mousePos.y = e.clientY - rect.top;
      
      if (dragging) {
        targetAngle += (e.clientX - lastX) * 0.01;
        lastX = e.clientX;
      }
    });
    canvas.addEventListener('mousedown', (e) => { dragging = true; lastX = e.clientX; });
    window.addEventListener('mouseup', () => { dragging = false; });
    
    function showTooltip(data) {
      const title = data.type === 'wing' ? '📚 Wing' : '🚪 Room';
      const extra = data.type === 'wing' ? `📦 ${data.drawers} drawers` : `📚 Wing: ${data.wing}`;
      document.getElementById('stats').innerHTML = `
        <div style="font-size:18px;color:${COLORS[data.name]||COLORS.default}">${data.name}</div>
        <div>${title}</div>
        <div>${extra}</div>
      `;
    }
    
    function hideTooltip() {
      document.getElementById('stats').innerHTML = statsText || 'Loading...';
    }
    
    let statsText = '';
    
    window.setView = function(view) {
      currentView = view;
      document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
      event?.target?.classList.add('active');
    };
    
    window.resetView = () => { cameraAngle = 0; targetAngle = 0; };
    
    // Load data
    async function loadData() {
      try {
        console.log('Loading data...');
        
        const [statusResp, wingsResp, taxonomyResp] = await Promise.all([
          fetch('http://localhost:8767/api/status'),
          fetch('http://localhost:8767/api/wings'),
          fetch('http://localhost:8767/api/taxonomy')
        ]);
        
        if (!statusResp.ok) throw new Error(`API error: ${statusResp.status}`);
        
        const status = await statusResp.json();
        wingsData = await wingsResp.json();
        const taxonomy = await taxonomyResp.json();
        
        console.log('Data loaded:', status);
        
        // Build rooms data
        Object.entries(taxonomy || {}).forEach(function(wingEntry) {
          var wing = wingEntry[0];
          var rooms = wingEntry[1];
          if (!roomsData[wing]) roomsData[wing] = [];
          if (typeof rooms === 'object') {
            Object.entries(rooms).forEach(function(roomEntry) {
              var room = roomEntry[0];
              var count = roomEntry[1];
              roomsData[wing].push({ name: room, drawers: typeof count === 'number' ? count : 1 });
            });
          }
        });
        
        // Update UI
        statsText = '<div>📦 ' + (status.total_drawers || 0) + ' drawers</div><div>📚 ' + Object.keys(wingsData).length + ' wings • 🚪 ' + Object.keys(status.rooms||{}).length + ' rooms</div>';
        document.getElementById('stats').innerHTML = statsText;
        
        var legendHtml = '';
        Object.entries(wingsData).forEach(function(entry) {
          var wing = entry[0];
          var count = entry[1];
          var color = COLORS[wing] || COLORS.default;
          legendHtml += '<div class="legend-item"><div class="legend-color" style="background:' + color + '"></div><span>' + wing + ': ' + count + ' drawers</span></div>';
        });
        document.getElementById('legend').innerHTML = legendHtml;
        
        document.getElementById('loading').style.display = 'none';
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading').innerHTML = '<div class="error">❌ Error: ' + error.message + '<br><small>Make sure <code>node server.js</code> is running</small></div>';
      }
    }
    
    // Polyfill for Math.cos/sin if needed
    if (!Number.prototype.cos) {
      Number.prototype.cos = function() { return Math.cos(this); };
      Number.prototype.sin = function() { return Math.sin(this); };
    }
    
    loadData();
    render();
  </script>
</body>
</html>
