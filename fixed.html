<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏰 MemPalace 3D Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; background: #0a0a0f; }
    #canvas { width: 100vw; height: 100vh; display: block; }
    .overlay { position: absolute; pointer-events: none; padding: 20px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .title { top: 0; left: 0; font-size: 28px; font-weight: 300; letter-spacing: 1px; z-index: 10; }
    .title span { font-weight: 600; }
    .stats { bottom: 0; left: 0; font-size: 14px; opacity: 0.8; line-height: 1.6; z-index: 10; }
    .controls { top: 0; right: 0; pointer-events: auto; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; backdrop-filter: blur(10px); z-index: 10; }
    .controls button { display: block; width: 100%; padding: 10px 15px; margin-bottom: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; text-align: left; }
    .controls button:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); }
    .controls button.active { background: rgba(100,150,255,0.3); border-color: rgba(100,150,255,0.6); }
    .legend { position: absolute; bottom: 0; right: 0; pointer-events: auto; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; backdrop-filter: blur(10px); z-index: 10; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 6px; color: white; }
    .legend-color { width: 16px; height: 16px; border-radius: 50%; }
    .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; color: white; text-align: center; z-index: 100; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #a5b4fc; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="overlay title">🏰 <span>MemPalace</span> Visualization</div>
  <div class="overlay stats" id="stats">Loading...</div>
  <div class="overlay controls">
    <button onclick="setView('wings')" class="active">📚 Wings View</button>
    <button onclick="setView('rooms')">🚪 Rooms View</button>
    <button onclick="resetView()">🔄 Reset View</button>
  </div>
  <div class="overlay legend" id="legend"></div>
  <div class="loading" id="loading"><div class="loading-spinner"></div>Loading MemPalace data...</div>

  <script>
    // Simple 3D engine - no dependencies!
    var canvas = document.getElementById('canvas');
    var ctx = canvas.getContext('2d');
    
    var width, height;
    var cameraAngle = 0, cameraDist = 100, cameraHeight = 30;
    var targetAngle = 0, dragging = false, lastX = 0;
    var wingsData = {}, roomsData = {}, currentView = 'wings';
    var nodes = [], hoveredNode = null;
    
    var COLORS = { projects: '#a5b4fc', shared_grocery_list: '#86efac', default: '#fbbf24' };
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    
    // 3D projection
    function project(x, y, z) {
      var rotX = cameraAngle;
      var rx = x;
      var ry = y * Math.cos(rotX) - z * Math.sin(rotX);
      var rz = y * Math.sin(rotX) + z * Math.cos(rotX);
      var dist = cameraDist - rz;
      var scale = 200 / Math.max(dist, 1);
      return {
        x: width/2 + rx * scale,
        y: height/2 - (ry - cameraHeight) * scale,
        scale: scale,
        depth: rz
      };
    }
    
    // Convert hex to rgba
    function hexToRgba(hex, alpha) {
      var r = parseInt(hex.slice(1,3), 16);
      var g = parseInt(hex.slice(3,5), 16);
      var b = parseInt(hex.slice(5,7), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }
    
    // Lighten hex color
    function lighten(hex, pct) {
      var num = parseInt(hex.slice(1), 16), amt = Math.round(2.55*pct);
      var r = Math.min(255, (num >> 16) + amt);
      var g = Math.min(255, ((num >> 8) & 0x00FF) + amt);
      var b = Math.min(255, (num & 0x0000FF) + amt);
      return '#' + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
    }
    
    // Darken hex color
    function darken(hex, pct) {
      var num = parseInt(hex.slice(1), 16), amt = Math.round(2.55*pct);
      var r = Math.max(0, (num >> 16) - amt);
      var g = Math.max(0, ((num >> 8) & 0x00FF) - amt);
      var b = Math.max(0, (num & 0x0000FF) - amt);
      return '#' + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
    }
    
    // Draw a sphere with gradient
    function drawSphere(x, y, radius, color, glow) {
      glow = glow || false;
      var grad = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, 0, x, y, radius);
      grad.addColorStop(0, lighten(color, 40));
      grad.addColorStop(0.5, color);
      grad.addColorStop(1, darken(color, 30));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
      if (glow) {
        ctx.fillStyle = hexToRgba(color, 0.1);
        ctx.beginPath();
        ctx.arc(x, y, radius * 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    // Draw line in 3D
    function drawLine(x1, y1, z1, x2, y2, z2, color, lineWidth) {
      lineWidth = lineWidth || 1;
      var p1 = project(x1, y1, z1);
      var p2 = project(x2, y2, z2);
      ctx.strokeStyle = hexToRgba(color, 0.3);
      ctx.lineWidth = lineWidth;
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
    }
    
    // Render wings view
    function renderWings() {
      var wingNames = Object.keys(wingsData);
      var angleStep = (Math.PI * 2) / wingNames.length;
      var radius = 30;
      
      nodes = [];
      
      // Draw center
      var centerProj = project(0, 0, 0);
      drawSphere(centerProj.x, centerProj.y, 8, '#666');
      
      for (var i = 0; i < wingNames.length; i++) {
        var wing = wingNames[i];
        var angle = i * angleStep;
        var x = Math.cos(angle) * radius;
        var z = Math.sin(angle) * radius;
        var proj = project(x, Math.sin(Date.now()*0.001 + i)*0.5, z);
        var size = Math.max(10, Math.min(30, (wingsData[wing] || 1) / 3));
        
        drawSphere(proj.x, proj.y, size, COLORS[wing] || COLORS.default, true);
        drawLine(0, 0, 0, x, 0, z, '#444');
        
        nodes.push({ x: proj.x, y: proj.y, r: size, data: { name: wing, type: 'wing', drawers: wingsData[wing] } });
      }
    }
    
    // Render rooms view
    function renderRooms() {
      var wingNames = Object.keys(roomsData);
      var wingAngleStep = (Math.PI * 2) / wingNames.length;
      var wingRadius = 30;
      
      nodes = [];
      
      // Draw center
      var centerProj = project(0, 0, 0);
      drawSphere(centerProj.x, centerProj.y, 8, '#666');
      
      for (var wi = 0; wi < wingNames.length; wi++) {
        var wing = wingNames[wi];
        var wingAngle = wi * wingAngleStep;
        var wx = Math.cos(wingAngle) * wingRadius;
        var wz = Math.sin(wingAngle) * wingRadius;
        
        drawSphere(project(wx, 0, wz).x, project(wx, 0, wz).y, 8, COLORS[wing] || COLORS.default);
        drawLine(0, 0, 0, wx, 0, wz, '#444');
        
        var rooms = roomsData[wing] || [];
        var roomAngleStep = (Math.PI * 2) / Math.max(rooms.length, 1);
        var roomRadius = 12;
        
        for (var ri = 0; ri < rooms.length; ri++) {
          var room = rooms[ri];
          var ra = wingAngle + ri * roomAngleStep;
          var rx = wx + Math.cos(ra) * roomRadius;
          var rz = wz + Math.sin(ra) * roomRadius;
          var proj = project(rx, 0, rz);
          var size = Math.max(4, Math.min(12, (room.drawers || 1) / 4));
          
          drawSphere(proj.x, proj.y, size, COLORS[wing] || COLORS.default);
          drawLine(wx, 0, wz, rx, 0, rz, '#333');
          
          nodes.push({ x: proj.x, y: proj.y, r: size, data: { name: room.name, type: 'room', wing: wing } });
        }
      }
    }
    
    // Main render loop
    function render() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, width, height);
      
      // Draw stars
      ctx.fillStyle = '#fff';
      for (var i = 0; i < 200; i++) {
        var sx = Math.cos(i * 137.5 * Math.PI / 180) * 100 + width/2;
        var sy = Math.sin(i * 97.3 * Math.PI / 180) * 50 + height/2;
        ctx.globalAlpha = 0.5 + Math.sin(Date.now()*0.002 + i)*0.3;
        ctx.beginPath();
        ctx.arc(sx, sy, 1, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      
      if (currentView === 'wings') {
        renderWings();
      } else if (currentView === 'rooms') {
        renderRooms();
      }
      
      // Auto-rotate
      cameraAngle += 0.002;
      
      // Hover detection and tooltip
      checkHover();
      
      requestAnimationFrame(render);
    }
    
    function checkHover() {
      var found = null;
      for (var i = 0; i < nodes.length; i++) {
        var node = nodes[i];
        var dx = mousePos.x - node.x;
        var dy = mousePos.y - node.y;
        if (dx*dx + dy*dy < node.r * node.r) {
          found = node;
          break;
        }
      }
      
      if (found && found !== hoveredNode) {
        hoveredNode = found;
        canvas.style.cursor = 'pointer';
        showTooltip(found.data);
      } else if (!found && hoveredNode) {
        hoveredNode = null;
        canvas.style.cursor = 'default';
        hideTooltip();
      }
    }
    
    var mousePos = { x: 0, y: 0 };
    canvas.addEventListener('mousemove', function(e) {
      var rect = canvas.getBoundingClientRect();
      mousePos.x = e.clientX - rect.left;
      mousePos.y = e.clientY - rect.top;
      
      if (dragging) {
        targetAngle += (e.clientX - lastX) * 0.01;
        lastX = e.clientX;
      }
    });
    canvas.addEventListener('mousedown', function(e) { dragging = true; lastX = e.clientX; });
    window.addEventListener('mouseup', function() { dragging = false; });
    
    function showTooltip(data) {
      var title = data.type === 'wing' ? '📚 Wing' : '🚪 Room';
      var extra = data.type === 'wing' ? '📦 ' + data.drawers + ' drawers' : '📚 Wing: ' + data.wing;
      var color = COLORS[data.name] || COLORS.default;
      document.getElementById('stats').innerHTML = '<div style="font-size:18px;color:' + color + '">' + data.name + '</div><div>' + title + '</div><div>' + extra + '</div>';
    }
    
    function hideTooltip() {
      document.getElementById('stats').innerHTML = statsText || 'Loading...';
    }
    
    var statsText = '';
    
    window.setView = function(view) {
      currentView = view;
      var buttons = document.querySelectorAll('#controls button');
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove('active');
      }
      if (event && event.target) {
        event.target.classList.add('active');
      }
    };
    
    window.resetView = function() { cameraAngle = 0; targetAngle = 0; };
    
    // Load data
    async function loadData() {
      try {
        console.log('Loading data...');
        
        var responses = await Promise.all([
          fetch('http://localhost:8767/api/status'),
          fetch('http://localhost:8767/api/wings'),
          fetch('http://localhost:8767/api/taxonomy')
        ]);
        
        var statusResp = responses[0];
        var wingsResp = responses[1];
        var taxonomyResp = responses[2];
        
        if (!statusResp.ok) throw new Error('API error: ' + statusResp.status);
        
        var status = await statusResp.json();
        wingsData = await wingsResp.json();
        var taxonomy = await taxonomyResp.json();
        
        console.log('Data loaded:', status);
        
        // Build rooms data
        var wingEntries = Object.entries(taxonomy || {});
        for (var i = 0; i < wingEntries.length; i++) {
          var entry = wingEntries[i];
          var wing = entry[0];
          var rooms = entry[1];
          if (!roomsData[wing]) roomsData[wing] = [];
          if (typeof rooms === 'object') {
            var roomEntries = Object.entries(rooms);
            for (var j = 0; j < roomEntries.length; j++) {
              var re = roomEntries[j];
              var room = re[0];
              var count = re[1];
              roomsData[wing].push({ name: room, drawers: typeof count === 'number' ? count : 1 });
            }
          }
        }
        
        // Update UI
        statsText = '<div>📦 ' + (status.total_drawers || 0) + ' drawers</div><div>📚 ' + Object.keys(wingsData).length + ' wings • 🚪 ' + Object.keys(status.rooms||{}).length + ' rooms</div>';
        document.getElementById('stats').innerHTML = statsText;
        
        var legendHtml = '';
        var wingDataEntries = Object.entries(wingsData);
        for (var k = 0; k < wingDataEntries.length; k++) {
          var wd = wingDataEntries[k];
          var wname = wd[0];
          var wcount = wd[1];
          var wcolor = COLORS[wname] || COLORS.default;
          legendHtml += '<div class="legend-item"><div class="legend-color" style="background:' + wcolor + '"></div><span>' + wname + ': ' + wcount + ' drawers</span></div>';
        }
        document.getElementById('legend').innerHTML = legendHtml;
        
        document.getElementById('loading').style.display = 'none';
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading').innerHTML = '<div class="error">❌ Error: ' + error.message + '<br><small>Make sure <code>node server.js</code> is running</small></div>';
      }
    }
    
    loadData();
    render();
  </script>
</body>
</html>
