<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏰 MemPalace 3D Visualization</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; background: #0a0a0f; }
    #canvas-container { width: 100vw; height: 100vh; }
    .overlay { position: absolute; pointer-events: none; padding: 20px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .title { top: 0; left: 0; font-size: 28px; font-weight: 300; letter-spacing: 1px; }
    .title span { font-weight: 600; }
    .stats { bottom: 0; left: 0; font-size: 14px; opacity: 0.8; line-height: 1.6; }
    .controls { top: 0; right: 0; pointer-events: auto; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; backdrop-filter: blur(10px); }
    .controls button { display: block; width: 100%; padding: 10px 15px; margin-bottom: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; text-align: left; }
    .controls button:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); }
    .controls button.active { background: rgba(100,150,255,0.3); border-color: rgba(100,150,255,0.6); }
    .tooltip { position: absolute; background: rgba(0,0,0,0.9); color: white; padding: 12px 16px; border-radius: 8px; font-size: 13px; pointer-events: none; opacity: 0; transition: opacity 0.2s; max-width: 300px; z-index: 100; border: 1px solid rgba(255,255,255,0.2); }
    .tooltip.visible { opacity: 1; }
    .tooltip-title { font-weight: 600; margin-bottom: 8px; color: #a5b4fc; }
    .legend { position: absolute; bottom: 0; right: 0; pointer-events: auto; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; backdrop-filter: blur(10px); }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 6px; color: white; }
    .legend-color { width: 16px; height: 16px; border-radius: 50%; }
    .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; color: white; text-align: center; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #a5b4fc; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div class="overlay title">🏰 <span>MemPalace</span> Visualization</div>
  <div class="overlay stats" id="stats">Loading...</div>
  <div class="overlay controls">
    <button onclick="setView('wings')" class="active">📚 Wings View</button>
    <button onclick="setView('rooms')">🚪 Rooms View</button>
    <button onclick="setView('graph')">🕸️ Graph View</button>
    <button onclick="resetView()">🔄 Reset View</button>
  </div>
  <div class="overlay legend" id="legend"></div>
  <div class="tooltip" id="tooltip"></div>
  <div class="loading" id="loading"><div class="loading-spinner"></div>Loading MemPalace data...</div>

  <script>
    console.log('🏰 MemPalace Viz starting...');
    
    const CONFIG = {
      wingColors: { projects: '#a5b4fc', shared_grocery_list: '#86efac', default: '#fbbf24' },
      nodeSizes: { wingMin: 3, wingMax: 8, roomMin: 0.8, roomMax: 2.5 },
      spacing: { wingSeparation: 40, roomRadius: 15 }
    };
    
    let scene, camera, renderer, controls;
    let wingsData = {}, roomsData = {}, taxonomyData = {}, graphEdges = [];
    let nodes = [], links = [], currentView = 'wings', hoveredNode = null;
    
    async function init() {
      console.log('🎨 Initializing Three.js...');
      
      const container = document.getElementById('canvas-container');
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a0f);
      scene.fog = new THREE.FogExp2(0x0a0a0f, 0.003);
      
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 30, 80);
      
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      container.appendChild(renderer.domElement);
      
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.5;
      
      const ambientLight = new THREE.AmbientLight(0x404040, 2);
      scene.add(ambientLight);
      
      createStars();
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
      
      console.log('✅ Three.js initialized');
      await loadData();
      animate();
    }
    
    function createStars() {
      const geometry = new THREE.BufferGeometry();
      const vertices = [];
      for (let i = 0; i < 2000; i++) {
        vertices.push(
          (Math.random() - 0.5) * 400,
          (Math.random() - 0.5) * 200,
          (Math.random() - 0.5) * 400
        );
      }
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      const material = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0.8 });
      scene.add(new THREE.Points(geometry, material));
    }
    
    async function loadData() {
      try {
        console.log('📡 Fetching data from API...');
        
        const [statusResp, wingsResp, taxonomyResp, graphResp] = await Promise.all([
          fetch('http://localhost:8767/api/status'),
          fetch('http://localhost:8767/api/wings'),
          fetch('http://localhost:8767/api/taxonomy'),
          fetch('http://localhost:8767/api/graph-stats')
        ]);
        
        if (!statusResp.ok) throw new Error(`Status API: ${statusResp.status}`);
        
        const status = await statusResp.json();
        wingsData = await wingsResp.json();
        taxonomyData = await taxonomyResp.json();
        const graphStats = await graphResp.json();
        
        console.log('✅ Data loaded:', status);
        
        // Build rooms data
        Object.entries(taxonomyData || {}).forEach(([wing, rooms]) => {
          if (!roomsData[wing]) roomsData[wing] = [];
          if (typeof rooms === 'object') {
            Object.entries(rooms).forEach(([room, count]) => {
              roomsData[wing].push({ name: room, drawers: typeof count === 'number' ? count : 1 });
            });
          }
        });
        
        // Build graph edges
        if (graphStats.tunnels) {
          graphEdges = Object.entries(graphStats.tunnels).flatMap(([room, conns]) => 
            Object.entries(conns).map(([to, wing]) => ({ from: room, to, wing }))
          );
        }
        
        // Update UI
        document.getElementById('stats').innerHTML = `
          <div>📦 ${status.total_drawers?.toLocaleString() || 0} drawers</div>
          <div>📚 ${Object.keys(status.wings || {}).length} wings • 🚪 ${Object.keys(status.rooms || {}).length} rooms</div>
        `;
        
        document.getElementById('legend').innerHTML = Object.entries(status.wings || wingsData).map(([wing, count]) => `
          <div class="legend-item">
            <div class="legend-color" style="background:${CONFIG.wingColors[wing]||CONFIG.wingColors.default}"></div>
            <span>${wing}: ${count} drawers</span>
          </div>
        `).join('');
        
        document.getElementById('loading').style.display = 'none';
        setView(currentView);
        
      } catch (error) {
        console.error('❌ Error:', error);
        document.getElementById('loading').innerHTML = `
          <div style="color:#f87171">
            ❌ Error: ${error.message}<br>
            <small>Make sure <code>node server.js</code> is running</small>
          </div>`;
      }
    }
    
    window.setView = function(view) {
      currentView = view;
      document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
      event?.target?.classList.add('active');
      
      nodes.forEach(n => scene.remove(n.mesh));
      links.forEach(l => scene.remove(l));
      nodes = []; links = [];
      controls.autoRotate = view !== 'graph';
      
      if (view === 'wings') renderWings();
      else if (view === 'rooms') renderRooms();
      else if (view === 'graph') renderGraph();
    };
    
    function renderWings() {
      const wings = Object.keys(wingsData);
      const angleStep = (Math.PI * 2) / wings.length;
      const radius = CONFIG.spacing.wingSeparation / 2;
      
      // Center node
      const center = new THREE.Mesh(
        new THREE.SphereGeometry(1, 16, 16),
        new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x333333, transparent: true, opacity: 0.5 })
      );
      scene.add(center);
      nodes.push({ mesh: center, data: { name: 'Center', type: 'center' } });
      
      wings.forEach((wing, i) => {
        const angle = i * angleStep;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const size = THREE.MathUtils.mapLinear(wingsData[wing], 10, 100, CONFIG.nodeSizes.wingMin, CONFIG.nodeSizes.wingMax);
        createWingNode(wing, x, 0, z, size);
        createLink([0,0,0], [x,0,z], 0x404040);
      });
    }
    
    function renderRooms() {
      const wingNames = Object.keys(roomsData);
      const wingAngleStep = (Math.PI * 2) / wingNames.length;
      const wingRadius = CONFIG.spacing.wingSeparation / 2;
      
      // Center
      const center = new THREE.Mesh(
        new THREE.SphereGeometry(1, 16, 16),
        new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x333333, transparent: true, opacity: 0.5 })
      );
      scene.add(center);
      nodes.push({ mesh: center, data: { name: 'Center', type: 'center' } });
      
      wingNames.forEach((wing, wi) => {
        const wingAngle = wi * wingAngleStep;
        const wx = Math.cos(wingAngle) * wingRadius;
        const wz = Math.sin(wingAngle) * wingRadius;
        createWingNode(wing, wx, 0, wz, CONFIG.nodeSizes.wingMin);
        createLink([0,0,0], [wx,0,wz], 0x404040);
        
        const rooms = roomsData[wing] || [];
        const roomAngleStep = (Math.PI * 2) / Math.max(rooms.length, 1);
        rooms.forEach((room, ri) => {
          const ra = wingAngle + ri * roomAngleStep;
          const rx = wx + Math.cos(ra) * CONFIG.spacing.roomRadius;
          const rz = wz + Math.sin(ra) * CONFIG.spacing.roomRadius;
          const size = THREE.MathUtils.mapLinear(room.drawers, 1, 50, CONFIG.nodeSizes.roomMin, CONFIG.nodeSizes.roomMax);
          createRoomNode(room.name, wing, rx, 0, rz, size);
          createLink([wx,0,wz], [rx,0,rz], 0x404040);
        });
      });
    }
    
    function renderGraph() {
      const allNodes = new Map();
      Object.keys(wingsData).forEach(w => allNodes.set(w, { name: w, type: 'wing', x: 0, y: 0, z: 0 }));
      Object.entries(roomsData).forEach(([wing, rooms]) => 
        rooms.forEach(r => allNodes.set(`${wing}/${r.name}`, { name: r.name, type: 'room', wing, x: 0, y: 0, z: 0 }))
      );
      
      // Simple force layout
      for (let iter = 0; iter < 50; iter++) {
        const arr = Array.from(allNodes.values());
        for (let i = 0; i < arr.length; i++) {
          for (let j = i + 1; j < arr.length; j++) {
            const dx = arr[i].x - arr[j].x, dy = arr[i].y - arr[j].y, dz = arr[i].z - arr[j].z;
            const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) + 0.1;
            const f = 100 / (dist * dist);
            arr[i].x += dx*f; arr[i].y += dy*f; arr[i].z += dz*f;
            arr[j].x -= dx*f; arr[j].y -= dy*f; arr[j].z -= dz*f;
          }
        }
        graphEdges.forEach(e => {
          const from = arr.find(n => n.name === e.from || `${n.wing}/${n.name}` === e.from);
          const to = arr.find(n => n.name === e.to || `${n.wing}/${n.name}` === e.to);
          if (from && to) {
            from.x += (to.x - from.x) * 0.01; from.y += (to.y - from.y) * 0.01; from.z += (to.z - from.z) * 0.01;
            to.x -= (to.x - from.x) * 0.01; to.y -= (to.y - from.y) * 0.01; to.z -= (to.z - from.z) * 0.01;
          }
        });
        arr.forEach(n => { n.x *= 0.995; n.y *= 0.995; n.z *= 0.995; });
      }
      
      allNodes.forEach((d, id) => {
        if (d.type === 'wing') createWingNode(id, d.x, d.y, d.z, CONFIG.nodeSizes.wingMin);
        else createRoomNode(d.name, d.wing, d.x, d.y, d.z, CONFIG.nodeSizes.roomMin);
      });
      
      graphEdges.forEach(e => {
        const from = Array.from(allNodes.values()).find(n => n.name === e.from || `${n.wing}/${n.name}` === e.from);
        const to = Array.from(allNodes.values()).find(n => n.name === e.to || `${n.wing}/${n.name}` === e.to);
        if (from && to) createLink([from.x,from.y,from.z], [to.x,to.y,to.z], 0x505050);
      });
    }
    
    function createWingNode(name, x, y, z, size) {
      const color = CONFIG.wingColors[name] || CONFIG.wingColors.default;
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(size, 32, 32),
        new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.3, transparent: true, opacity: 0.9 })
      );
      mesh.position.set(x, y, z);
      mesh.userData = { name, type: 'wing', drawers: wingsData[name] };
      
      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(size * 1.3, 32, 32),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.1, side: THREE.BackSide })
      );
      mesh.add(glow);
      
      scene.add(mesh);
      nodes.push({ mesh, data: { name, type: 'wing', drawers: wingsData[name] } });
    }
    
    function createRoomNode(name, wing, x, y, z, size) {
      const color = CONFIG.wingColors[wing] || CONFIG.wingColors.default;
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(size, 16, 16),
        new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.2, transparent: true, opacity: 0.8 })
      );
      mesh.position.set(x, y, z);
      mesh.userData = { name, type: 'room', wing };
      scene.add(mesh);
      nodes.push({ mesh, data: { name, type: 'room', wing } });
    }
    
    function createLink(from, to, color) {
      const geometry = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(...from), new THREE.Vector3(...to)
      ]);
      const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.3 });
      const line = new THREE.Line(geometry, material);
      scene.add(line);
      links.push(line);
    }
    
    renderer.domElement.addEventListener('mousemove', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      const mouse = new THREE.Vector2(
        ((e.clientX - rect.left) / rect.width) * 2 - 1,
        -((e.clientY - rect.top) / rect.height) * 2 + 1
      );
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(nodes.map(n => n.mesh));
      
      if (intersects.length > 0) {
        hoveredNode = intersects[0].object;
        document.body.style.cursor = 'pointer';
        showTooltip(e.clientX, e.clientY, hoveredNode.userData);
      } else {
        hoveredNode = null;
        document.body.style.cursor = 'default';
        hideTooltip();
      }
    });
    
    function showTooltip(x, y, data) {
      const tip = document.getElementById('tooltip');
      let html = `<div class="tooltip-title">${data.name}</div>`;
      if (data.type === 'wing') {
        html += `<div>📚 Wing</div><div>📦 ${data.drawers} drawers</div>`;
      } else if (data.type === 'room') {
        html += `<div>🚪 Room</div><div>📚 Wing: ${data.wing}</div>`;
      }
      tip.innerHTML = html;
      tip.style.left = (x + 15) + 'px';
      tip.style.top = (y + 15) + 'px';
      tip.classList.add('visible');
    }
    
    function hideTooltip() { document.getElementById('tooltip').classList.remove('visible'); }
    window.resetView = () => { camera.position.set(0, 30, 80); controls.target.set(0, 0, 0); controls.update(); };
    
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      nodes.forEach((n, i) => {
        if (n.data.type !== 'center') {
          n.mesh.position.y = Math.sin(Date.now() * 0.001 + i * 0.5) * 0.5;
          n.mesh.rotation.y += 0.01;
        }
      });
      renderer.render(scene, camera);
    }
    
    init();
  </script>
</body>
</html>
